# Mac ARM (Apple Silicon) compatible: services use linux/arm64 where available.
# If an image fails to pull, set that service to platform: linux/amd64 (emulated).
name: recipe-backend

services:
  db:
    image: postgres:15
    platform: linux/arm64
    container_name: supabase-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - "54322:5432"
    shm_size: "256mb"
    volumes:
      - supabase_db_data2:/var/lib/postgresql/data

  rest:
    image: postgrest/postgrest:v9.0.1
    platform: linux/arm64
    container_name: supabase-rest
    restart: unless-stopped
    depends_on: [db]
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_JWT_ROLE_CLAIM_KEY: .role
      PGRST_DB_USE_LEGACY_GUCS: "false"
    ports:
      - "54324:3000"

  auth:
    image: supabase/gotrue:v2.158.1
    platform: linux/arm64
    container_name: supabase-auth
    restart: unless-stopped
    depends_on: [db]
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?search_path=auth
      GOTRUE_SITE_URL: ${SITE_URL:-https://foosdi.no}
      GOTRUE_URI_ALLOW_LIST: ${SITE_URL:-https://foosdi.no}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
    ports:
      - "54325:9999"

  storage:
    image: supabase/storage-api:v1.11.13
    platform: linux/arm64
    container_name: supabase-storage
    restart: unless-stopped
    depends_on: [db, rest]
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    volumes:
      - supabase_storage_data:/var/lib/storage
    ports:
      - "54326:5000"

  studio:
    image: supabase/studio:latest
    platform: linux/arm64
    container_name: supabase-studio
    restart: unless-stopped
    depends_on: [db, rest, auth, storage]
    environment:
      SUPABASE_URL: ${API_EXTERNAL_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      STUDIO_PG_META_URL: http://meta:8080
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
    ports:
      - "${STUDIO_PORT}:3000"

  kong:
    image: kong:2.8
    platform: linux/amd64  # no arm64 image; runs via Rosetta 2 on Mac
    container_name: supabase-kong
    restart: unless-stopped
    depends_on: [rest, auth, storage]
    ports:
      - "54321:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors
    volumes:
      - ./kong.yml:/kong/kong.yml:ro

  meta:
    image: supabase/postgres-meta:v0.95.2
    platform: linux/arm64
    container_name: supabase-meta
    restart: unless-stopped
    depends_on: [db]
    environment:
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: ${POSTGRES_USER}
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
      PG_META_PORT: 8080
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY}
    ports:
      - "54327:8080"

volumes:
  supabase_db_data2:
  supabase_storage_data: