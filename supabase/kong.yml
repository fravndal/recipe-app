_format_version: "2.1"

services:
  - name: rest
    url: http://rest:3000
    routes:
      - name: rest-route
        paths: ["/rest/v1"]
        strip_path: true

  - name: auth
    url: http://auth:9999
    routes:
      - name: auth-route
        paths: ["/auth/v1"]
        strip_path: true

  - name: storage
    url: http://storage:5000
    routes:
      - name: storage-route
        paths: ["/storage/v1"]
        strip_path: true

plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: ["GET","POST","PUT","PATCH","DELETE","OPTIONS","HEAD"]
      headers: 
        - Authorization
        - Content-Type
        - apikey
        - x-client-info
        - x-supabase-api-version
        - accept-profile
        - content-profile
        - prefer
        - range
        - x-upsert
      exposed_headers:
        - Content-Range
        - X-Total-Count
      credentials: true
      max_age: 3600